<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f8f8;
      font-family: Arial, sans-serif;
      color: #333;
    }
    .container{
        width: 1440px;
    }

    .breadcrumb-text {
        width: 155px;
        height: 21px;
      font-size: 14px;
      color: #999;
      line-height: 21px;
      margin-bottom: 30px;

    }

    .breadcrumb-text span {
      color: #000;
      width: 83px;
    }

    .sidebar {
      padding-top: 16px;
      padding-bottom: 16px;
      padding-left: 8px;
      padding-right: 8px;
    }

    .sidebar h6 {
        width: 166px;
        height: 24;
      font-weight: 500;
      font-size: 16px;
      margin-bottom: 16px;
      line-height: 24px;
    }

    .sidebar a {
      display: block;
      color: #888;
      text-decoration: none;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .sidebar a.active,
    .sidebar a:hover {
      color: #e74c3c;
    }

    .welcome-text {
      text-align: right;
      font-size: 13px;
      margin-bottom: 20px;
    }

    .welcome-text span {
      color: #e74c3c;
      font-weight: 500;
    }

    .profile-card {
      background: #fff;
      border: 1px solid #eee;
      padding: 35px;
      border-radius: 4px;
    }

    .profile-card h5 {
      color: #e74c3c;
      font-size: 18px;
      margin-bottom: 25px;
      font-weight: 600;
    }

    .form-label {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .form-control {
      border-radius: 0;
      background-color: #f7f7f7;
      border: 1px solid #eee;
      font-size: 13px;
      height: 42px;
    }

    .password-title {
      font-size: 14px;
      font-weight: 600;
      margin-top: 20px;
      margin-bottom: 12px;
    }

    .btn-save {
      background-color: #e74c3c;
      border: none;
      color: #fff;
      padding: 10px 28px;
      font-size: 13px;
      border-radius: 3px;
    }

    .btn-save:hover {
      background-color: #d84335;
    }

    .btn-cancel {
      background: transparent;
      border: none;
      color: #333;
      font-size: 13px;
      margin-right: 15px;
    }
  </style>
</head>
<body>

  <div class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
      <div class="breadcrumb-text">
        Home / <span>My Account</span>
      </div>
      <div class="welcome-text">
        Welcome! <span>Rahul GHOSH</span>
      </div>
    </div>

    <div class="row">
      <!-- Sidebar -->
      <div class="col-md-3 sidebar">
        <h6>Manage My Account</h6>
        <a href="#" class="active">My Profile</a>
        <a href="#">Address Book</a>
        <a href="#">My Payment Options</a>

        <h6 class="mt-4">My Orders</h6>
        <a href="#">My Returns</a>
        <a href="#">My Cancellations</a>

        <h6 class="mt-4">My Wishlist</h6>
      </div>

      <!-- Profile Form -->
      <div class="col-md-9">
        <div class="profile-card">
          <h5>Edit Your Profile</h5>

          <form>
            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">First Name</label>
                <input type="text" class="form-control" value="">
              </div>
              <div class="col-md-6">
                <label class="form-label">Last Name</label>
                <input type="text" class="form-control" value="">
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" value=>
              </div>
              <div class="col-md-6">
                <label class="form-label">Address</label>
                <input type="text" class="form-control" value=>
              </div>
            </div>

            <div class="password-title">Password Changes</div>

            <div class="mb-3">
              <input type="password" class="form-control" placeholder="Current Password">
            </div>

            <div class="mb-3">
              <input type="password" class="form-control" placeholder="New Password">
            </div>

            <div class="mb-4">
              <input type="password" class="form-control" placeholder="Confirm New Password">
            </div>

            <div class="d-flex justify-content-end align-items-center">
              <button type="button" class="btn-cancel">Cancel</button>
              <button type="submit" class="btn btn-save">Save Changes</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
